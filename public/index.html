<!DOCTYPE html>
<html lang='zh-CN' data-theme='dark'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<title>AirBeat · 在线音乐播放器</title>
<link rel='manifest' href='/manifest.json'>
<meta name='theme-color' content='#8b5cf6'>
<link rel='stylesheet' href='/css/style.css'>
</head>
<body>
<div class='app'>
  <aside class='sidebar glass'>
    <div class='logo'>🎵 AirBeat</div>
    <nav>
      <a href='#/discover' data-route='discover'>✨ 发现</a>
      <a href='#/search' data-route='search'>🔍 搜索</a>
      <a href='#/radio' data-route='radio'>📻 电台</a>
      <a href='#/recognize' data-route='recognize'>🎙️ 听歌识曲</a>
      <a href='#/playlists' data-route='playlists'>📚 我的歌单</a>
      <a href='#/favorites' data-route='favorites'>❤️ 收藏</a>
      <a href='#/recent' data-route='recent'>🕐 最近播放</a>
      <a href='#/subsonic' id='nav-subsonic' data-route='subsonic' style='display:none'>☁️ 自建曲库</a>
      <a href='#/sources' data-route='sources'>🧩 音源</a>
    </nav>
    <div class='sidebar-bottom'>
      <button id='theme-toggle' class='icon-btn' title='切换主题'>🌓</button>
      <button id='auth-btn' class='btn'>登录</button>
    </div>
  </aside>
  <main id='view'></main>
</div>

<footer id='player-bar' class='glass'>
  <div class='pb-left'>
    <img id='pb-cover' src='' alt='' style='visibility:hidden'>
    <div style='min-width:0'>
      <div id='pb-title'>未在播放</div>
      <div id='pb-artist'></div>
    </div>
  </div>
  <div class='pb-center'>
    <div class='pb-buttons'>
      <button id='btn-mode' class='icon-btn' title='播放模式'>🔁</button>
      <button id='btn-prev' class='icon-btn'>⏮</button>
      <button id='btn-play' class='icon-btn big'>▶</button>
      <button id='btn-next' class='icon-btn'>⏭</button>
      <button id='btn-full' class='icon-btn' title='全屏播放页'>⛶</button>
    </div>
    <div class='pb-progress'>
      <span id='t-cur'>0:00</span>
      <input type='range' id='seek' min='0' max='1000' value='0'>
      <span id='t-dur'>0:00</span>
    </div>
  </div>
  <div class='pb-right'>
    <button id='btn-queue' class='icon-btn' title='播放队列'>🎶</button>
    🔊 <input type='range' id='volume' min='0' max='100' value='80'>
  </div>
</footer>

<section id='fullscreen' class='hidden'>
  <div class='fs-bg-glow-container'>
    <div class='fs-bg-glow glow-1'></div>
    <div class='fs-bg-glow glow-2'></div>
    <div class='fs-bg-glow glow-3'></div>
  </div>
  <button id='fs-close' class='icon-btn'>▼</button>
  <canvas id='fs-canvas'></canvas>
  <div class='fs-content'>
    <div class='fs-left'>
      <img id='fs-cover' src='' alt=''>
      <div id='fs-title'></div>
      <div id='fs-artist'></div>
      <button id='viz-style' class='btn ghost'>切换可视化样式</button>
      <button id='eq-toggle' class='btn ghost'>均衡器</button>
    </div>
    <div class='fs-right'>
      <div class='lyrics-control'>
        <button id='lyric-offset-dec' class='btn ghost' title='歌词推迟 0.5 秒'>⏰ -0.5s</button>
        <span id='lyric-offset-val' class='muted'>歌词偏移: 0.0s</span>
        <button id='lyric-offset-inc' class='btn ghost' title='歌词提前 0.5 秒'>⏰ +0.5s</button>
        <button id='lyric-offset-reset' class='btn ghost' title='重置偏移'>重置</button>
      </div>
      <div class='fs-lyrics' id='fs-lyrics'><p class='muted'>暂无歌词</p></div>
    </div>
  </div>
  <div id='eq-panel' class='eq-panel glass hidden'>
    <div class='eq-header'>
      <select id='eq-preset' class='btn ghost' style='color:var(--text)'>
        <option value=''>自定义</option>
        <option value='pop'>流行</option>
        <option value='rock'>摇滚</option>
        <option value='vocal'>人声</option>
        <option value='classical'>古典</option>
        <option value='electronic'>电子</option>
      </select>
      <button id='eq-reset' class='btn ghost'>重置</button>
      <button id='eq-close' class='icon-btn'>✕</button>
    </div>
    <div class='eq-bands' id='eq-bands'></div>
  </div>
</section>

<dialog id='auth-modal' class='glass'>
  <h3 id='auth-title'>登录</h3>
  <form id='auth-form'>
    <input id='auth-email' type='email' placeholder='邮箱' required>
    <input id='auth-password' type='password' placeholder='密码(至少 6 位)' required minlength='6'>
    <p id='auth-error' class='error'></p>
    <button class='btn' type='submit' id='auth-submit'>登录</button>
    <button class='btn ghost' type='button' id='auth-switch'>没有账号?去注册</button>
    <button class='btn ghost' type='button' id='auth-close'>关闭</button>
  </form>
</dialog>

<dialog id='picker-modal' class='glass'>
  <h3>加入歌单</h3>
  <div id='picker-list' style='margin:14px 0'></div>
  <form method='dialog' class='picker-form'>
    <input id='picker-name' placeholder='新歌单名称'>
    <button class='btn' id='picker-create' type='button'>创建并加入</button>
    <button class='btn ghost' type='submit'>取消</button>
  </form>
</dialog>

<dialog id='webdav-modal' class='glass'>
  <h3>WebDAV 云备份同步</h3>
  <form id='webdav-form'>
    <p class='muted' style='font-size:11px;line-height:1.4'>将你的个人数据（收藏、歌单）同步至 WebDAV 网盘。注：坚果云需使用专用的应用密码。</p>
    <input id='webdav-url' type='url' placeholder='服务器地址(例: https://dav.jianguoyun.com/dav/)' required autocomplete='on'>
    <input id='webdav-user' type='text' placeholder='用户名' required autocomplete='on'>
    <input id='webdav-pass' type='password' placeholder='应用密码/Token' required>
    <div style='display:flex;gap:8px;margin-top:6px'>
      <button class='btn' type='button' id='webdav-upload' style='flex:1'>上传备份</button>
      <button class='btn' type='button' id='webdav-download' style='flex:1'>下载同步</button>
    </div>
    <p id='webdav-error' class='error' style='margin:4px 0'></p>
    <button class='btn ghost' type='button' id='webdav-close'>关闭</button>
  </form>
</dialog>

<dialog id='import-external-modal' class='glass'>
  <h3>导入外部歌单</h3>
  <form id='import-external-form'>
    <p class='muted' style='font-size:11px;line-height:1.4'>输入网易云音乐或 QQ 音乐的公开歌单分享链接，或直接输入网易云歌单 ID。</p>
    <input id='import-external-url' type='text' placeholder='粘贴分享链接或网易云歌单ID...' required autocomplete='off'>
    <p id='import-external-error' class='error' style='margin:4px 0'></p>
    <button class='btn' type='submit' id='import-external-submit'>解析并导入</button>
    <button class='btn ghost' type='button' id='import-external-close'>取消</button>
  </form>
</dialog>

<!-- 播放队列抽屉 -->
<div id='queue-drawer' class='queue-drawer glass'>
  <div class='queue-header'>
    <h3>播放队列</h3>
    <div style='display:flex;gap:6px;align-items:center'>
      <button id='queue-clear' class='btn ghost small' style='padding:4px 10px;font-size:11px'>清空</button>
      <button id='queue-close' class='icon-btn small'>✕</button>
    </div>
  </div>
  <div id='queue-list' class='queue-list'></div>
</div>

<audio id='audio' crossorigin='anonymous' preload='auto'></audio>
<script type='module' src='/js/app.js'></script>
</body>
</html>
